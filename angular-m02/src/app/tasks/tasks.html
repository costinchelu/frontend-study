@if (isAddingTask) {
  <app-new-task (close)="onCloseAddTask()" [userId]="userId"/>
}

<section id="tasks">
  <header>
    <h2>{{ name }}'s tasks</h2>
    <menu>
      <button (click)="onStartAddTask()" >Add task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks; track task.id) {
      <li>
        <!--bind the task property in TaskComponent [child] to the object received in the loop
        from the TasksComponent [parent];
        also listen to an event from the child (output event called complete in task.ts),
        and trigger logic in tasks.ts (onCompleteTask)-->
        <app-task [task]="task"/>
      </li>
    }
  </ul>
</section>
